name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        run: xcodebuild build-for-testing -scheme Formula1 -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' -quiet

      - name: Test
        run: xcodebuild test-without-building -scheme Formula1 -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max' -only-testing:Formula1Tests -quiet
