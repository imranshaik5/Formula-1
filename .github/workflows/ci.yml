name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: List simulators
        run: xcrun simctl list devices available 2>&1 | head -20

      - name: Build
        run: |
          DEVICE=$(xcrun simctl list devices available 2>&1 | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Using device: $DEVICE"
          xcodebuild build-for-testing -scheme Formula1 -destination "platform=iOS Simulator,name=$DEVICE" -quiet

      - name: Test
        run: |
          DEVICE=$(xcrun simctl list devices available 2>&1 | grep -oE 'iPhone [^(]+' | head -1 | xargs)
          echo "Using device: $DEVICE"
          xcodebuild test-without-building -scheme Formula1 -destination "platform=iOS Simulator,name=$DEVICE" -only-testing:Formula1Tests -quiet
